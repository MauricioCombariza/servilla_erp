services:

  postgres:
    image: postgres:16
    container_name: servilla_pg
    environment:
      POSTGRES_DB:       servilla_erp
      POSTGRES_USER:     servilla
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${PG_PORT:-5440}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servilla -d servilla_erp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: servilla_backend
    environment:
      DATABASE_URL:     postgresql+asyncpg://servilla:${POSTGRES_PASSWORD}@postgres:5432/servilla_erp
      BASES_WEB_URL:    ${BASES_WEB_URL:-}
      JWT_SECRET:       ${JWT_SECRET}
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS:-http://localhost}
      ENVIRONMENT:      ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # No expone puerto al exterior — sólo accesible desde nginx

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: servilla_frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: servilla_nginx
    ports:
      - "8080:80"       # Caddy hace el TLS y proxea a este puerto
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pg_data:
