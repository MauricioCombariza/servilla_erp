upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Debe quedar por ENCIMA de MAX_UPLOAD_BYTES (150 MB) en
    # backend/app/routers/ordenes.py: si nginx corta primero, el cliente recibe
    # el 413 en HTML plano y el frontend no puede leer el campo `detail`, así que
    # muestra un error genérico en vez del mensaje que dice qué hacer.
    client_max_body_size 500M;

    # API → FastAPI
    # 600s porque la carga masiva de órdenes procesa el CSV dentro del request.
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    # Health check directo al backend
    location /health {
        proxy_pass http://backend/health;
    }

    # Frontend SPA
    location / {
        proxy_pass         http://frontend/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
